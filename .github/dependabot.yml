# Dependabot configuration for macro-bus.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # Rust / Cargo dependencies for the whole workspace (single lockfile at root).
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "rust"
    # Group low-risk updates into a single PR to cut review noise; let major
    # bumps come through on their own so they can be reviewed individually.
    groups:
      cargo-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
